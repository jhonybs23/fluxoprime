workflows:
  maui-ios-unsigned-sideload-lab:
    name: FluxoPrime iOS unsigned sideload lab
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      xcode: edge
      vars:
        DOTNET_INSTALL_DIR: "/Users/builder/dotnet"
        PROJECT_PATH: "projeto ios/FluxoPrimeIos/FluxoPrimeIos.csproj"
        PROJECT_DIR: "projeto ios/FluxoPrimeIos"
        IOS_CONFIGURATION: "Release"
    scripts:
      - name: Prepare .NET 9 and MAUI workloads
        script: |
          set -euo pipefail
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          bash dotnet-install.sh --channel 9.0 --install-dir "$DOTNET_INSTALL_DIR"
          export DOTNET_ROOT="$DOTNET_INSTALL_DIR"
          export PATH="$DOTNET_ROOT:$PATH"
          dotnet --info
          dotnet workload install maui ios --source https://api.nuget.org/v3/index.json
      - name: Restore iOS dependencies
        script: |
          set -euo pipefail
          export DOTNET_ROOT="$DOTNET_INSTALL_DIR"
          export PATH="$DOTNET_ROOT:$PATH"
          dotnet restore "$PROJECT_PATH" -p:TargetFramework=net9.0-ios -p:RuntimeIdentifier=ios-arm64
      - name: Build unsigned iOS app bundle
        script: |
          set -euo pipefail
          export DOTNET_ROOT="$DOTNET_INSTALL_DIR"
          export PATH="$DOTNET_ROOT:$PATH"
          dotnet publish "$PROJECT_PATH" \
            -f net9.0-ios \
            -c "$IOS_CONFIGURATION" \
            -p:RuntimeIdentifier=ios-arm64 \
            -p:ArchiveOnBuild=false \
            -p:BuildIpa=false \
            -p:EnableCodeSigning=false \
            -p:MtouchLink=SdkOnly
      - name: Package unsigned IPA for Sideloadly or AltStore
        script: |
          set -euo pipefail
          APP_PATH="$(find "$PROJECT_DIR/bin/$IOS_CONFIGURATION/net9.0-ios/ios-arm64" -name "*.app" -type d | head -n 1)"
          if [ -z "$APP_PATH" ]; then
            echo "No .app bundle was generated."
            find "$PROJECT_DIR/bin/$IOS_CONFIGURATION/net9.0-ios" -maxdepth 5 -type d || true
            exit 1
          fi

          rm -rf artifacts
          mkdir -p artifacts/Payload
          cp -R "$APP_PATH" artifacts/Payload/
          (cd artifacts && /usr/bin/zip -qry "FluxoPrimeTV-ios-unsigned-${CM_BUILD_ID:-local}.ipa" Payload)
          echo "Unsigned IPA created in artifacts/."
    artifacts:
      - artifacts/*.ipa
      - "projeto ios/FluxoPrimeIos/bin/Release/net9.0-ios/ios-arm64/**/*.app"
      - "projeto ios/FluxoPrimeIos/bin/Release/net9.0-ios/ios-arm64/**/*.dSYM"

  maui-ios-simulator-smoke:
    name: FluxoPrime iOS simulator smoke build
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      xcode: edge
      vars:
        DOTNET_INSTALL_DIR: "/Users/builder/dotnet"
        PROJECT_PATH: "projeto ios/FluxoPrimeIos/FluxoPrimeIos.csproj"
    scripts:
      - name: Prepare .NET 9 and MAUI workloads
        script: |
          set -euo pipefail
          curl -sSL https://dot.net/v1/dotnet-install.sh -o dotnet-install.sh
          bash dotnet-install.sh --channel 9.0 --install-dir "$DOTNET_INSTALL_DIR"
          export DOTNET_ROOT="$DOTNET_INSTALL_DIR"
          export PATH="$DOTNET_ROOT:$PATH"
          dotnet --info
          dotnet workload install maui ios --source https://api.nuget.org/v3/index.json
      - name: Build iOS simulator app
        script: |
          set -euo pipefail
          export DOTNET_ROOT="$DOTNET_INSTALL_DIR"
          export PATH="$DOTNET_ROOT:$PATH"
          dotnet build "$PROJECT_PATH" \
            -f net9.0-ios \
            -c Debug \
            -p:RuntimeIdentifier=iossimulator-arm64 \
            -p:EnableCodeSigning=false
    artifacts:
      - "projeto ios/FluxoPrimeIos/bin/Debug/net9.0-ios/iossimulator-arm64/**/*.app"
